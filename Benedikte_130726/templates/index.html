<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Memorizer</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .hidden { display: none; }
        #text-display { background: #f0f0f0; padding: 20px; border-radius: 5px; margin: 20px 0; font-size: 18px; }
        #typing-input { width: 100%; padding: 10px; font-size: 16px; border: 2px solid #ccc; border-radius: 5px; }
        .correct { color: green; }
        .incorrect { color: red; background: #ffe6e6; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; }
        #feedback { margin-top: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Typing Memorizer</h1>
    <div id="upload-section">
        <h2>Sube tu archivo de texto</h2>
        <input type="file" id="file-input" accept=".txt">
        <button onclick="uploadFile()">Cargar</button>
    </div>
    <div id="typing-section" class="hidden">
        <h2>Escribe el texto</h2>
        <div id="text-display"></div>
        <input type="text" id="typing-input" placeholder="Escribe aquí..." autocomplete="off">
        <div id="feedback"></div>
        <button onclick="nextLine()">Siguiente línea</button>
        <button onclick="reset()">Reiniciar</button>
    </div>
    <script>
        let lines = [];
        let currentIndex = 0;
        async function uploadFile() {
            const file = document.getElementById('file-input').files[0];
            if (!file) { alert('Selecciona un archivo'); return; }
            const formData = new FormData();
            formData.append('file', file);
            const response = await fetch('/upload', { method: 'POST', body: formData });
            const data = await response.json();
            lines = data.lines;
            currentIndex = 0;
            document.getElementById('upload-section').classList.add('hidden');
            document.getElementById('typing-section').classList.remove('hidden');
            showCurrentLine();
        }
        function showCurrentLine() {
            if (currentIndex >= lines.length) {
                document.getElementById('text-display').textContent = '¡Completado!';
                document.getElementById('typing-input').disabled = true;
                return;
            }
            document.getElementById('text-display').textContent = lines[currentIndex];
            document.getElementById('typing-input').value = '';
            document.getElementById('feedback').textContent = '';
            document.getElementById('typing-input').focus();
        }
        document.getElementById('typing-input').addEventListener('input', function(e) {
            const target = lines[currentIndex];
            const typed = e.target.value;
            const feedback = document.getElementById('feedback');
            if (typed === target) { feedback.textContent = '✓ ¡Correcto!'; feedback.className = 'correct'; }
            else if (target.startsWith(typed)) { feedback.textContent = 'Continúa...'; feedback.className = ''; }
            else { feedback.textContent = '✗ Error, revisa'; feedback.className = 'incorrect'; }
        });
        function nextLine() { currentIndex++; showCurrentLine(); }
        function reset() { currentIndex = 0; document.getElementById('typing-input').disabled = false; showCurrentLine(); }
    </script>
</body>
</html>
